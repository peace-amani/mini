<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/Y4344hCQ/upload-1774693829195-1eaa41ad-jpg.jpg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WOLFY — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #00ff00; --primary-border: rgba(0,255,0,0.2); --gray-500: #555; --gray-400: #9ca3af; --white: #e0e0e0; }
    body {
      background: #000; color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .neon-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .neon-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,255,0,0.05) 0%, transparent 70%);
    }
    .wrap {
      position: relative; z-index: 10; text-align: center;
      padding: 40px 24px; max-width: 480px;
      animation: fadeIn 0.8s ease both;
    }
    .icon-wrap {
      width: 80px; height: 80px; border-radius: 20px;
      background: rgba(0,255,0,0.05); border: 1px solid var(--primary-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: glowPulse 3s ease-in-out infinite;
    }
    .title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(1.6rem, 5vw, 2.4rem); color: var(--primary); letter-spacing: 0.05em; margin-bottom: 10px; }
    .subtitle { font-family: 'Orbitron', monospace; font-size: 0.8rem; color: var(--gray-400); letter-spacing: 0.15em; margin-bottom: 24px; }
    .msg { font-size: 0.88rem; color: var(--gray-400); line-height: 1.7; max-width: 340px; margin: 0 auto 32px; }
    .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: 0 auto 28px; }
    .status-row {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 7px 18px; border-radius: 999px;
      background: rgba(0,255,0,0.05); border: 1px solid var(--primary-border);
      font-size: 0.75rem; color: var(--primary);
    }
    .blink { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); animation: blink 1.5s infinite; }
    .footer { margin-top: 40px; font-size: 0.7rem; color: var(--gray-500); }
    .footer a { color: var(--gray-500); text-decoration: none; }
    .footer a:hover { color: var(--primary); }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 10px rgba(0,255,0,0.1)}50%{box-shadow:0 0 30px rgba(0,255,0,0.25)} }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="neon-bg"></div>
<div class="wrap">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="#00ff00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
  </div>
  <div class="title">UNDER MAINTENANCE</div>
  <div class="subtitle">// SYSTEM UPDATE IN PROGRESS</div>
  <div class="divider"></div>
  <p class="msg">WOLFY Bot is temporarily offline for scheduled maintenance and updates.<br/><br/>We'll be back shortly — check back soon.</p>
  <div class="status-row">
    <div class="blink"></div>
    Working on improvements...
  </div>
  <div class="footer" style="margin-top:32px">
    WOLFY Bot &nbsp;·&nbsp; <a href="/admin">Admin →</a>
  </div>
</div>
</body>
</html>
