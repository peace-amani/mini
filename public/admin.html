<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WOLFY Admin Dashboard</title>
  <style>
    :root {
      --green: #00e676;
      --green-dim: #00c853;
      --bg: #080808;
      --surface: #101010;
      --surface2: #161616;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --muted: #555;
      --red: #ff5252;
      --yellow: #ffd740;
      --blue: #64b5f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 30px;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .login-card .wolf { font-size: 2.5rem; margin-bottom: 8px; }
    .login-card h1 { font-size: 1.3rem; color: var(--green); font-weight: 800; letter-spacing: 2px; }
    .login-card .sub { font-size: 0.8rem; color: var(--muted); margin: 6px 0 24px; }
    .login-card input {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 11px 14px; color: var(--text);
      font-size: 0.9rem; outline: none; margin-bottom: 12px;
    }
    .login-card input:focus { border-color: var(--green); }
    .login-card .btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: var(--green); color: #000; font-weight: 800; font-size: 0.9rem;
      cursor: pointer; letter-spacing: 0.5px;
    }
    .login-card .btn:hover { background: var(--green-dim); }
    .login-err { color: var(--red); font-size: 0.8rem; margin-top: 10px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .topbar .brand { font-weight: 800; color: var(--green); font-size: 1.1rem; letter-spacing: 2px; }
    .topbar .controls { display: flex; gap: 10px; align-items: center; }
    .topbar .refresh-btn, .topbar .logout-btn {
      padding: 6px 14px; border-radius: 6px; border: none;
      font-size: 0.8rem; cursor: pointer; font-weight: 600;
    }
    .topbar .refresh-btn { background: #1a1a1a; color: var(--text); border: 1px solid #2a2a2a; }
    .topbar .refresh-btn:hover { border-color: var(--green); color: var(--green); }
    .topbar .logout-btn { background: #1a0d0d; color: var(--red); border: 1px solid #3a1a1a; }
    .topbar .logout-btn:hover { background: #2a1010; }
    .last-refresh { font-size: 0.72rem; color: var(--muted); }

    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* STAT CARDS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
    }
    .stat-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 800; }
    .stat-card.green .value { color: var(--green); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.red .value { color: var(--red); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.dim .value { color: var(--muted); }
    .db-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.72rem; margin-top: 6px;
      color: var(--muted);
    }
    .db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .db-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }

    /* SESSIONS TABLE */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h2 { font-size: 0.95rem; font-weight: 700; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.8rem;
      cursor: pointer; transition: all 0.15s;
    }
    .tab.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
    .tab:hover:not(.active) { border-color: #444; color: var(--text); }

    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead th {
      background: var(--surface2); padding: 11px 14px; text-align: left;
      font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
      font-weight: 600;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 11px 14px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.active { background: #0d1a0d; color: var(--green); border: 1px solid #1a3a1a; }
    .badge.active .badge-dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .badge.inactive { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border); }
    .badge.inactive .badge-dot { background: var(--muted); }
    .badge.pairing { background: #1a160a; color: var(--yellow); border: 1px solid #3a2e0a; }
    .badge.pairing .badge-dot { background: var(--yellow); }

    .del-btn {
      padding: 4px 10px; border-radius: 5px; border: 1px solid #3a1a1a;
      background: #1a0d0d; color: var(--red); font-size: 0.75rem; cursor: pointer;
    }
    .del-btn:hover { background: #2a1010; }

    .empty-row td { text-align: center; color: var(--muted); padding: 32px; }
    .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="wolf">🐺</div>
    <h1>WOLFY</h1>
    <p class="sub">Admin Dashboard — Login Required</p>
    <input type="password" id="passInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn" onclick="doLogin()">Login</button>
    <div class="login-err" id="loginErr">Invalid password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">🐺 WOLFY ADMIN</div>
    <div class="controls">
      <span class="last-refresh" id="lastRefresh">—</span>
      <button class="refresh-btn" onclick="loadAll()">⟳ Refresh</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card dim"><div class="label">Total Sessions</div><div class="value" id="statTotal">—</div></div>
      <div class="stat-card green"><div class="label">Active</div><div class="value" id="statActive">—</div></div>
      <div class="stat-card red"><div class="label">Inactive</div><div class="value" id="statInactive">—</div></div>
      <div class="stat-card yellow"><div class="label">Pairing</div><div class="value" id="statPairing">—</div></div>
      <div class="stat-card blue">
        <div class="label">Database</div>
        <div class="value" id="statUptime">—</div>
        <div class="db-badge"><div class="db-dot" id="dbDot"></div><span id="dbStatus">checking...</span></div>
      </div>
    </div>

    <!-- SESSIONS -->
    <div class="section-header">
      <h2>Sessions</h2>
    </div>
    <div class="tab-bar">
      <button class="tab active" id="tabAll" onclick="switchTab('all')">All</button>
      <button class="tab" id="tabActive" onclick="switchTab('active')">Active</button>
      <button class="tab" id="tabInactive" onclick="switchTab('inactive')">Inactive</button>
      <button class="tab" id="tabPairing" onclick="switchTab('pairing')">Pairing</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Phone</th>
            <th>Status</th>
            <th>Connected</th>
            <th>Last Seen</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="sessionsBody">
          <tr><td colspan="6" class="loading">Loading sessions...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
let allSessions = [];
let currentTab = 'all';
let adminToken = '';

// ---- AUTH ----
async function doLogin() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (data.success) {
      adminToken = pass;
      showDashboard();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  } catch {
    document.getElementById('loginErr').style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/auth/logout', { method: 'POST' });
  adminToken = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadAll();
  setInterval(loadAll, 30000);
}

// ---- DATA ----
async function loadAll() {
  await Promise.all([loadStats(), loadSessions()]);
  document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats');
    if (!res.ok) return;
    const data = await res.json();
    const s = data.stats;
    document.getElementById('statTotal').textContent = s.total ?? '—';
    document.getElementById('statActive').textContent = s.active ?? '—';
    document.getElementById('statInactive').textContent = s.inactive ?? '—';
    document.getElementById('statPairing').textContent = s.pairing ?? '—';
    document.getElementById('statUptime').textContent = formatUptime(data.uptime);
    const dbDot = document.getElementById('dbDot');
    const dbStatus = document.getElementById('dbStatus');
    if (data.db?.connected) {
      dbDot.classList.add('on');
      dbStatus.textContent = 'MongoDB connected';
    } else {
      dbDot.classList.remove('on');
      dbStatus.textContent = 'Disconnected';
    }
  } catch {}
}

async function loadSessions() {
  try {
    const res = await fetch('/api/admin/sessions');
    if (!res.ok) return;
    const data = await res.json();
    allSessions = data.sessions || [];
    renderTable();
  } catch {}
}

function renderTable() {
  const body = document.getElementById('sessionsBody');
  let rows = allSessions;
  if (currentTab === 'active') rows = rows.filter(s => s.status === 'active');
  else if (currentTab === 'inactive') rows = rows.filter(s => s.status === 'inactive');
  else if (currentTab === 'pairing') rows = rows.filter(s => s.status === 'pairing');

  if (!rows.length) {
    body.innerHTML = `<tr class="empty-row"><td colspan="6">No sessions found</td></tr>`;
    return;
  }

  body.innerHTML = rows.map(s => `
    <tr>
      <td><code>${s.phone}</code></td>
      <td>${statusBadge(s.status)}</td>
      <td>${fmtDate(s.connectedAt)}</td>
      <td>${fmtDate(s.lastSeen)}</td>
      <td>${fmtDate(s.createdAt)}</td>
      <td><button class="del-btn" onclick="deleteSession('${s.phone}')">Delete</button></td>
    </tr>
  `).join('');
}

function switchTab(tab) {
  currentTab = tab;
  ['all','active','inactive','pairing'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
  });
  renderTable();
}

async function deleteSession(phone) {
  if (!confirm(`Delete session for ${phone}? This cannot be undone.`)) return;
  try {
    const res = await fetch(`/api/admin/session/${phone}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      allSessions = allSessions.filter(s => s.phone !== phone);
      renderTable();
      loadStats();
    } else alert('Failed: ' + data.error);
  } catch {
    alert('Network error');
  }
}

// ---- HELPERS ----
function statusBadge(status) {
  const map = { active: 'Active', inactive: 'Inactive', pairing: 'Pairing' };
  return `<span class="badge ${status}"><span class="badge-dot"></span>${map[status] || status}</span>`;
}

function fmtDate(d) {
  if (!d) return '<span style="color:var(--muted)">—</span>';
  const date = new Date(d);
  return date.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatUptime(secs) {
  if (!secs) return '—';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// Check if already authenticated
fetch('/auth/check').then(r => r.json()).then(data => {
  if (data.success) showDashboard();
}).catch(() => {});
</script>
</body>
</html>
